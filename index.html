  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header { margin-bottom: 2.5rem; text-align: center; }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .links a {
      color: #a0a0a0;
      text-decoration: none;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      border: 1px solid #252525;
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s;
    }

    .links a:hover,
    .links a:focus-visible {
      color: #fff;
      border-color: #555;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #444;
    }
